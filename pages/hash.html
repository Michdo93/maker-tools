<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hash-Generator – MakerTools</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="topnav">
  <a class="topnav-brand" href="../index.html">🔧 MAKER<em>TOOLS</em></a>
  <a href="../index.html">Start</a>
  <a href="widerstand.html">🎨 Widerstand</a>
  <a href="hash.html" class="active">#️⃣ Hash</a>
  <a href="passwort.html">🔑 Passwort</a>
</nav>
<div class="container">
  <h1 class="page-title">#️⃣ Hash-<em>Generator</em></h1>
  <p class="page-sub">SHA-1, SHA-256, SHA-384, SHA-512 – lokal im Browser, kein Upload</p>

  <div class="card">
    <div class="card-title">Text hashen</div>
    <div class="field"><label>Eingabe</label>
      <textarea class="output" id="hash-input" style="min-height:100px;resize:vertical" placeholder="Text hier eingeben…" oninput="hashText()"></textarea>
    </div>
    <div id="hash-results"></div>
  </div>

  <div class="card">
    <div class="card-title">Datei hashen</div>
    <input type="file" id="hash-file" onchange="hashFile()" style="font-size:.82rem;color:var(--muted);margin-bottom:.85rem">
    <div id="file-info" style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem"></div>
    <div id="file-results"></div>
  </div>

  <div class="card">
    <div class="card-title">Hash vergleichen</div>
    <div class="field"><label>Hash 1</label><input type="text" id="cmp1" placeholder="SHA-256 Hash…" style="font-family:var(--mono);font-size:.82rem"></div>
    <div class="field"><label>Hash 2</label><input type="text" id="cmp2" placeholder="SHA-256 Hash…" style="font-family:var(--mono);font-size:.82rem"></div>
    <div class="btns"><button class="btn" onclick="compareHashes()">Vergleichen</button></div>
    <div id="cmp-result" style="margin-top:.75rem;display:none"></div>
  </div>
</div>

<script src="../js/nav.js"></script>
<script>
const ALGOS = ['SHA-1','SHA-256','SHA-384','SHA-512'];

async function digest(algo, data) {
  const buf = await crypto.subtle.digest(algo, data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function renderHashes(results, target) {
  document.getElementById(target).innerHTML = results.map(([algo,hash]) =>
    `<div class="result-box" style="margin-bottom:.6rem">
       <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
         <span class="badge badge-yellow">${algo}</span>
         <button class="btn btn-sm btn-outline" onclick="navigator.clipboard.writeText('${hash}')">Kopieren</button>
       </div>
       <div style="font-family:var(--mono);font-size:.78rem;word-break:break-all;color:var(--white)">${hash}</div>
     </div>`
  ).join('');
}

async function hashText() {
  const text = document.getElementById('hash-input').value;
  if (!text) { document.getElementById('hash-results').innerHTML=''; return; }
  const enc = new TextEncoder().encode(text);
  const results = await Promise.all(ALGOS.map(async a => [a, await digest(a, enc)]));
  renderHashes(results, 'hash-results');
}

async function hashFile() {
  const file = document.getElementById('hash-file').files[0];
  if (!file) return;
  document.getElementById('file-info').textContent = `${file.name} · ${(file.size/1024).toFixed(1)} KB`;
  const buf = await file.arrayBuffer();
  const results = await Promise.all(ALGOS.map(async a => [a, await digest(a, buf)]));
  renderHashes(results, 'file-results');
}

function compareHashes() {
  const a = document.getElementById('cmp1').value.trim().toLowerCase();
  const b = document.getElementById('cmp2').value.trim().toLowerCase();
  const eq = a && b && a===b;
  const el = document.getElementById('cmp-result');
  el.style.display='block';
  el.innerHTML = `<div class="result-box" style="text-align:center">
    <span class="badge ${eq?'badge-green':'badge-red'}" style="font-size:.9rem;padding:.3rem 1rem">${eq?'✓ Identisch':'✗ Unterschiedlich'}</span>
  </div>`;
}
</script>
</body></html>
